name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore .NET
        run: dotnet restore

      - name: Build .NET
        run: dotnet build --no-restore

      - name: Test .NET
        run: dotnet test --no-build

      - name: Install client deps
        working-directory: src/agent-academy-client
        run: npm ci

      - name: Build client
        working-directory: src/agent-academy-client
        run: npm run build

      - name: Test client
        working-directory: src/agent-academy-client
        run: npm test

      - name: Typecheck client
        working-directory: src/agent-academy-client
        run: npx tsc --noEmit
