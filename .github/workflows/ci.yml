name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  spec-drift:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for spec drift
        run: scripts/check-spec-drift.sh

  commit-lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate conventional commits
        run: |
          # Check all commits in the PR follow conventional commit format
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert|merge)(\(.+\))?\!?: .+'

          COMMITS=$(git log --format="%h %s" "$BASE".."$HEAD") || {
            echo "❌ Failed to resolve commit range"
            exit 1
          }

          MERGE_PATTERN='^Merge '

          FAILED=0
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            SHA=$(echo "$line" | cut -d' ' -f1)
            SUBJECT=$(echo "$line" | cut -d' ' -f2-)
            # Skip merge commits — they use Git's default message format
            if echo "$SUBJECT" | grep -qE "$MERGE_PATTERN"; then
              continue
            fi
            if ! echo "$SUBJECT" | grep -qE "$PATTERN"; then
              echo "❌ Bad commit: $SHA — $SUBJECT"
              FAILED=1
            fi
          done <<< "$COMMITS"

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "Commits must follow Conventional Commits: type(scope): description"
            echo "Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
            exit 1
          fi

          echo "✅ All commits follow conventional commit format"

  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('src/agent-academy-client/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Restore .NET
        run: dotnet restore

      - name: Build .NET
        run: dotnet build --no-restore

      - name: Test .NET
        run: dotnet test --no-build

      - name: Install client deps
        working-directory: src/agent-academy-client
        run: npm ci

      - name: Build client
        working-directory: src/agent-academy-client
        run: npm run build

      - name: Test client
        working-directory: src/agent-academy-client
        run: npm test

      - name: Typecheck client
        working-directory: src/agent-academy-client
        run: npx tsc --noEmit
