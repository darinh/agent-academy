name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  spec-drift:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for spec drift
        run: scripts/check-spec-drift.sh

  commit-lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate conventional commits
        run: |
          # Check all commits in the PR follow conventional commit format
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert|merge)(\(.+\))?\!?: .+'

          COMMITS=$(git log --format="%h %s" "$BASE".."$HEAD") || {
            echo "❌ Failed to resolve commit range"
            exit 1
          }

          MERGE_PATTERN='^Merge '

          FAILED=0
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            SHA=$(echo "$line" | cut -d' ' -f1)
            SUBJECT=$(echo "$line" | cut -d' ' -f2-)
            # Skip merge commits — they use Git's default message format
            if echo "$SUBJECT" | grep -qE "$MERGE_PATTERN"; then
              continue
            fi
            if ! echo "$SUBJECT" | grep -qE "$PATTERN"; then
              echo "❌ Bad commit: $SHA — $SUBJECT"
              FAILED=1
            fi
          done <<< "$COMMITS"

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "Commits must follow Conventional Commits: type(scope): description"
            echo "Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
            exit 1
          fi

          echo "✅ All commits follow conventional commit format"

  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('src/agent-academy-client/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Restore .NET
        run: dotnet restore

      - name: Build .NET
        run: dotnet build --no-restore

      - name: Test .NET with coverage
        run: >-
          dotnet test --no-build
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate .NET coverage report
        run: >-
          reportgenerator
          -reports:"TestResults/**/coverage.cobertura.xml"
          -targetdir:"TestResults/report"
          -reporttypes:"Cobertura;TextSummary;MarkdownSummaryGithub"

      - name: Install client deps
        working-directory: src/agent-academy-client
        run: npm ci

      - name: Build client
        working-directory: src/agent-academy-client
        run: npm run build

      - name: Test client with coverage
        working-directory: src/agent-academy-client
        run: npm run test:coverage

      - name: Typecheck client
        working-directory: src/agent-academy-client
        run: npx tsc --noEmit

      - name: Coverage summary
        if: always()
        run: |
          echo "## 📊 Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # .NET coverage
          echo "### Backend (.NET)" >> $GITHUB_STEP_SUMMARY
          if [ -f TestResults/report/Summary.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat TestResults/report/Summary.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "_No backend coverage report generated._" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          # Frontend coverage — parse Cobertura XML for line-rate
          echo "### Frontend (Vitest)" >> $GITHUB_STEP_SUMMARY
          FRONTEND_COV="src/agent-academy-client/coverage/cobertura-coverage.xml"
          if [ -f "$FRONTEND_COV" ]; then
            LINE_RATE=$(grep -oP 'line-rate="\K[^"]+' "$FRONTEND_COV" | head -1)
            if [ -n "$LINE_RATE" ]; then
              PERCENT=$(echo "$LINE_RATE * 100" | bc -l | xargs printf "%.1f")
              echo "**Line coverage**: ${PERCENT}%" >> $GITHUB_STEP_SUMMARY
            fi
            BRANCH_RATE=$(grep -oP 'branch-rate="\K[^"]+' "$FRONTEND_COV" | head -1)
            if [ -n "$BRANCH_RATE" ]; then
              PERCENT=$(echo "$BRANCH_RATE * 100" | bc -l | xargs printf "%.1f")
              echo "**Branch coverage**: ${PERCENT}%" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "_No frontend coverage report generated._" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            TestResults/report/
            src/agent-academy-client/coverage/
          retention-days: 30
